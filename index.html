<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador WebAR Automatizado</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { text-align: center; background: #222; padding: 25px; border-radius: 16px; width: 85%; max-width: 380px; border: 1px solid #333; }
        h1 { font-size: 1.6rem; margin: 0; color: #00e5ff; }
        p { color: #aaa; font-size: 0.9rem; margin: 10px 0 20px 0; }
        model-viewer { width: 100%; height: 320px; background-color: #1a1a1a; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .btn-ar { background: linear-gradient(135deg, #007bff, #00e5ff); color: white; border: none; padding: 14px; font-size: 1rem; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; }
        .loading-status { color: #ffc107; font-weight: bold; margin-bottom: 15px; font-size: 0.95rem; }
        
        /* Estilo para el contenedor del mensaje de carga */
        #progress-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00e5ff; font-weight: bold; background: rgba(0,0,0,0.85); padding: 12px 24px; border-radius: 8px; pointer-events: none; border: 1px solid #333; z-index: 10; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="txt-lote">Conectando...</h1>
        <p id="txt-info">Buscando información del lote en la base de datos.</p>

        <div id="status" class="loading-status">Cargando datos del lote...</div>

        <model-viewer id="visor" src="" ar ar-modes="webxr scene-viewer quick-look" camera-controls touch-action="none" shadow-intensity="1" style="display:none;">
            <div id="progress-container" slot="progress-bar">
                Cargando modelo 3D: <span id="porcentaje">0%</span>
            </div>
            <button slot="ar-button" class="btn-ar">🏢 VER EN EL TERRENO</button>
        </model-viewer>
    </div>

    <script>
        // ==========================================
        // TU ENLACE DE GOOGLE SHEETS (CSV)
        // ==========================================
        const URL_SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrH1cqJKfyCOYazMfFMMl0UiY9Kf9AGKySUlzDQFNBdkWnTeybXHDDxzdlFwOOeS7xW-P-URy6g6Xe/pub?output=csv";

        const urlParams = new URLSearchParams(window.location.search);
        const loteBuscado = urlParams.get('lote');

        const txtLote = document.getElementById('txt-lote');
        const txtInfo = document.getElementById('txt-info');
        const visor = document.getElementById('visor');
        const status = document.getElementById('status');
        const progressContainer = document.getElementById('progress-container');
        const porcentajeTxt = document.getElementById('porcentaje');

        function obtenerIdDrive(url) {
            const regExp = /\/d\/([a-zA-Z0-9-_]+)/;
            const matches = url.match(regExp);
            return matches ? matches[1] : null;
        }

        if (loteBuscado) {
            txtLote.innerText = `Lote N° ${loteBuscado}`;
            
            fetch(URL_SHEET_CSV)
                .then(response => response.text())
                .then(data => {
                    const filas = data.split("\n");
                    let modeloEncontrado = null;

                    for (let i = 1; i < filas.length; i++) {
                        const columnas = filas[i].split(",");
                        if (columnas[0] && columnas[0].trim() === loteBuscado.trim()) {
                            modeloEncontrado = columnas[1] ? columnas[1].trim() : null;
                            break;
                        }
                    }

                    if (modeloEncontrado) {
                        let urlFinal = modeloEncontrado;
                        
                        if (modeloEncontrado.includes("drive.google.com")) {
                            const idDrive = obtenerIdDrive(modeloEncontrado);
                            if (idDrive) {
                                urlFinal = `https://docs.google.com/uc?export=download&id=${idDrive}`;
                            }
                        }

                        visor.setAttribute('src', urlFinal);
                        visor.style.display = 'block';
                        status.style.display = 'none';
                        txtInfo.innerText = "Descargando la arquitectura de la casa...";

                        // Monitorear el progreso numérico de la descarga
                        visor.addEventListener('progress', (event) => {
                            const progreso = Math.round(event.detail.totalProgress * 100);
                            porcentajeTxt.innerText = `${progreso}%`;
                        });

                        // EVENTO CLAVE: Se ejecuta automáticamente cuando la casa está lista y dibujada
                        visor.addEventListener('load', () => {
                            progressContainer.style.display = 'none'; // Desaparece por completo el cuadro gris de carga
                            txtInfo.innerText = "¡Estructura lista! Presiona el botón para proyectar la propiedad.";
                        });

                    } else {
                        status.innerText = "Lote disponible o no registrado.";
                        txtInfo.innerText = "Este terreno no cuenta con una simulación asignada aún.";
                    }
                })
                .catch(err => {
                    status.innerText = "Error de enlace con el servidor de datos.";
                    console.error(err);
                });
        } else {
            txtLote.innerText = "Acceso Restringido";
            status.innerText = "Por favor, escanea un código QR autorizado para este terreno.";
        }
    </script>
</body>
</html>
